# 日志中心 - 已接入机器清单（生产环境）
# 格式：hostname | loki_host | env | project | log_path
#
# hostname  : 机器标识，对应 Fluent Bit 的 host 标签
# loki_host : 该机器上 Fluent Bit 转发日志的目标 Loki 地址
# env       : 环境标识（pre / prod）
# project   : 项目名（gaobao / huiyuce_app）
# log_path  : 该机器上需要采集的日志路径 glob 模式
#
# 说明：
# - 服务器 A 的 loki_host 为 127.0.0.1（本机采集）
# - 其他机器填写 A 的内网 IP
# - 新增机器时，在下方追加一行，然后执行对应 deploy 脚本即可

# 日志中心服务端（同时采集本地 huiyuce_app 日志）
server-a | 127.0.0.1       | prod | huiyuce_app | /work/projectData/api/*/data/logs/*/*.log, /work/projectData/admin/*/data/logs/*/*.log

# gaobao 项目服务器
server-b | 129.204.182.195 | prod | gaobao      | /work/projectData/gaobao/api/*/data/logs/*/*.log
server-c | 129.204.182.195 | prod | gaobao      | /work/projectData/gaobao/api/*/data/logs/*/*.log
server-d | 129.204.182.195 | prod | gaobao      | /work/projectData/gaobao/api/*/data/logs/*/*.log

# huiyuce_app 项目服务器
server-e | 129.204.182.195 | prod | huiyuce_app | /work/projectData/api/*/data/logs/*/*.log, /work/projectData/admin/*/data/logs/*/*.log
