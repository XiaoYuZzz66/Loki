# 日志中心 - 已接入机器清单
# 格式：hostname | loki_host | env | log_path
#
# hostname  : 机器标识，对应 Fluent Bit 的 host 标签，也是 GAOBAO_HOST 环境变量值
# loki_host : 该机器上 Fluent Bit 转发日志的目标 Loki 地址
# env       : 环境标识（pre / prod）
# log_path  : 该机器上需要采集的日志路径 glob 模式
#
# 说明：
# - 以 # 开头的行为注释，空行自动跳过
# - 服务器 A 的 loki_host 为 127.0.0.1（本机采集），其他机器填写 A 的内网 IP
# - 新增机器时，在下方追加一行，然后在该机器上执行 deploy-remote.sh 即可

server-a | 127.0.0.1   | pre | /work/projectData/gaobao/api/*/data/logs/*/*.log
server-b | 192.168.1.185 | pre | /work/projectData/gaobao/api/*/data/logs/*/*.log
