# Fluent Bit - 服务器 A（采集 huiyuce_app + gaobao 应用文件日志）
[SERVICE]
    Flush         5
    Daemon        off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ---- huiyuce_app 项目（无日期前缀格式）----
# 排除 blm-admin-auth 子目录（该目录使用含日期+traceId 的格式，走 gaobao_app 解析器）
[INPUT]
    Name              tail
    Tag               app.huiyuce
    Path              /work/projectData/gaobao/api/*/data/logs/*/*.log
    Exclude_Path      /work/projectData/gaobao/api/*/data/logs/blm-admin-auth/*.log
    Parser            huiyuce_app
    Path_Key          filepath
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     20MB
    Skip_Long_Lines   On

[FILTER]
    Name   lua
    Match  app.huiyuce
    script /fluent-bit/etc/map_huiyuce_labels.lua
    call   cb_map

[FILTER]
    Name          record_modifier
    Match         app.huiyuce
    Record        host ${GAOBAO_HOST}
    Record        env ${GAOBAO_ENV}

[OUTPUT]
    Name                   loki
    Match                  app.huiyuce
    Host                   127.0.0.1
    Port                   3100
    Labels                 job=huiyuce_app, env=${GAOBAO_ENV}, host=${GAOBAO_HOST}, container=$container_name, source=app_file
    Auto_Kubernetes_Labels off

# ---- gaobao 项目（含日期+traceId 格式，如 blm-admin-auth）----
[INPUT]
    Name              tail
    Tag               app.gaobao
    Path              /work/projectData/gaobao/api/*/data/logs/blm-admin-auth/*.log
    Parser            gaobao_app
    Path_Key          filepath
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     20MB
    Skip_Long_Lines   On

[FILTER]
    Name   lua
    Match  app.gaobao
    script /fluent-bit/etc/map_app_labels.lua
    call   cb_map

[FILTER]
    Name          record_modifier
    Match         app.gaobao
    Record        host ${GAOBAO_HOST}
    Record        env ${GAOBAO_ENV}

[OUTPUT]
    Name                   loki
    Match                  app.gaobao
    Host                   127.0.0.1
    Port                   3100
    Labels                 job=gaobao, env=${GAOBAO_ENV}, host=${GAOBAO_HOST}, container=$container_name, source=app_file
    Auto_Kubernetes_Labels off
