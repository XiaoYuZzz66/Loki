# 业务日志时间为北京时间（Asia/Shanghai），必须声明 +0800，否则 Loki 会当成 UTC 并拒收（timestamp too new）
[PARSER]
    Name        gaobao_app
    Format      regex
    Regex       ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}) \[(?<thread>[^\]]*)\] traceId=\[(?<trace_id>[^\]]*)\] (?<level>\w+)\s+(?<logger>[^\s]+) - \[(?<method>[^\]]+)\] - (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S.%L
    Time_Offset +0800
    Time_Keep   On
