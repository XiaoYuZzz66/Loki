# gaobao 项目日志格式：无日期前缀，时间 + 线程 + 级别 + 类 + 方法 + 消息
# 示例: 10:33:06.894 [nacos-executor-1] INFO  c.a.n.c.r.client - [printIfInfoEnabled,63] - [traceId] 消息
[PARSER]
    Name        gaobao_app
    Format      regex
    Regex       ^(?<time>\d{2}:\d{2}:\d{2}\.\d{3}) \[(?<thread>[^\]]*)\] (?<level>\w+)\s+(?<logger>[^\s]+) - \[(?<method>[^\]]+)\] - (?<message>.*)$
    Time_Key    time
    Time_Format %H:%M:%S.%L
    Time_Offset +0800
    Time_Keep   On

# huiyuce_app 项目日志格式：含日期+traceId
# 示例: 2026-06-17 10:50:40.214 [线程] traceId=[] LEVEL 类 - [方法,行] - 消息
[PARSER]
    Name        huiyuce_app
    Format      regex
    Regex       ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}) \[(?<thread>[^\]]*)\] traceId=\[(?<trace_id>[^\]]*)\] (?<level>\w+)\s+(?<logger>[^\s]+) - \[(?<method>[^\]]+)\] - (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S.%L
    Time_Offset +0800
    Time_Keep   On
